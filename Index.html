<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1"/>
<meta name="theme-color" content="#050505"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Aegis Prime ⚡</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800;900&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet"/>

<style>
/* =====================================================
   AEGIS PRIME — GLOBAL STYLES
   Midnight Black · Neon Violet · Gold
   ===================================================== */
:root {
  --bg:          #050505;
  --bg1:         #0a0a10;
  --bg2:         #0f0f1a;
  --border:      rgba(255,255,255,0.07);
  --violet:      #7c3aed;
  --violet-l:    #a78bfa;
  --violet-d:    #4c1d95;
  --violet-glow: rgba(124,58,237,0.35);
  --gold:        #f59e0b;
  --gold-l:      #fcd34d;
  --gold-glow:   rgba(245,158,11,0.35);
  --text:        #e2d9f3;
  --text-dim:    rgba(226,217,243,0.4);
  --green:       #10b981;
  --red:         #ef4444;
  --radius:      14px;
  --font-display:'Syne', sans-serif;
  --font-mono:   'JetBrains Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); overflow: hidden; color: var(--text); }
body { font-family: var(--font-display); -webkit-tap-highlight-color: transparent; }
::selection { background: var(--violet-glow); color: white; }

/* Scrollbar */
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--violet-glow); border-radius: 2px; }

/* ── Animations ── */
@keyframes float    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
@keyframes ping     { 75%,100%{transform:scale(2.2);opacity:0} }
@keyframes shimmer  { 0%{opacity:.5} 50%{opacity:1} 100%{opacity:.5} }
@keyframes wave     { 0%,100%{height:6px} 50%{height:20px} }
@keyframes slideUp  { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn   { from{opacity:0} to{opacity:1} }
@keyframes spin     { to{transform:rotate(360deg)} }
@keyframes pulseGlow{ 0%,100%{box-shadow:0 0 16px var(--violet-glow)} 50%{box-shadow:0 0 36px var(--violet-glow),0 0 60px rgba(124,58,237,.15)} }
@keyframes blink    { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes nebula   { 0%{transform:scale(1) translate(0,0)} 100%{transform:scale(1.2) translate(12px,-12px)} }
@keyframes loadBar  { from{width:0} to{width:100%} }

/* ── Layout ── */
#app {
  display: flex; flex-direction: column;
  height: 100vh; height: 100dvh;
  position: relative; overflow: hidden;
}

/* ── Ambient background ── */
#ambient {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background: var(--bg);
  overflow: hidden;
}
#ambient .orb1 {
  position: absolute; top: -120px; left: -120px;
  width: 420px; height: 420px; border-radius: 50%;
  background: radial-gradient(circle, rgba(124,58,237,.22) 0%, transparent 70%);
  animation: nebula 9s ease-in-out infinite alternate;
}
#ambient .orb2 {
  position: absolute; top: -80px; right: -80px;
  width: 320px; height: 320px; border-radius: 50%;
  background: radial-gradient(circle, rgba(245,158,11,.1) 0%, transparent 70%);
  animation: nebula 11s ease-in-out infinite alternate-reverse;
}
#ambient .orb3 {
  position: absolute; bottom: -80px; left: 50%;
  transform: translateX(-50%);
  width: 600px; height: 220px; border-radius: 50%;
  background: radial-gradient(ellipse, rgba(124,58,237,.12) 0%, transparent 70%);
  animation: nebula 13s ease-in-out infinite alternate;
}
#ambient .grid {
  position: absolute; inset: 0; opacity: .04;
  background-image:
    linear-gradient(rgba(139,92,246,.5) 1px, transparent 1px),
    linear-gradient(90deg, rgba(139,92,246,.5) 1px, transparent 1px);
  background-size: 56px 56px;
}

/* ── Loading Screen ── */
#loading-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: #050505;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
  transition: opacity .6s ease;
}
#loading-screen.hide { opacity: 0; pointer-events: none; }
#loading-screen .logo-wrap {
  width: 72px; height: 72px; border-radius: 20px;
  background: linear-gradient(135deg, var(--violet), var(--violet-d));
  box-shadow: 0 0 40px var(--violet-glow), 0 0 80px rgba(124,58,237,.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 34px;
  animation: float 2.5s ease-in-out infinite;
}
#loading-screen .brand {
  font-family: var(--font-display);
  font-weight: 900; font-size: 22px; letter-spacing: .12em;
  background: linear-gradient(135deg, var(--violet-l), var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
#loading-screen .sub {
  font-family: var(--font-mono); font-size: 10px;
  color: rgba(255,255,255,.2); letter-spacing: .25em; text-transform: uppercase;
}
#loading-screen .bar-wrap {
  width: 180px; height: 2px; background: rgba(255,255,255,.08); border-radius: 2px; overflow: hidden;
}
#loading-screen .bar-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, var(--violet), var(--gold));
  animation: loadBar 1.8s ease forwards;
}

/* ── Header ── */
#header {
  position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  background: rgba(5,5,5,.85);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header-brand { display: flex; align-items: center; gap: 10px; }
.header-logo {
  width: 34px; height: 34px; border-radius: 10px;
  background: linear-gradient(135deg, var(--violet), var(--violet-d));
  box-shadow: 0 0 16px var(--violet-glow);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.header-title {
  font-weight: 900; font-size: 16px; letter-spacing: .1em;
  background: linear-gradient(135deg, var(--violet-l), var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-sub {
  font-family: var(--font-mono); font-size: 9px;
  color: rgba(255,255,255,.2); letter-spacing: .18em; text-transform: uppercase;
}
.header-actions { display: flex; align-items: center; gap: 8px; }

/* Status badge */
.status-dot {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--font-mono); font-size: 10px; letter-spacing: .1em;
}
.dot { width: 8px; height: 8px; border-radius: 50%; position: relative; }
.dot::after {
  content: ''; position: absolute; inset: 0;
  border-radius: 50%; animation: ping 1.6s ease-in-out infinite;
}
.dot-green { background: var(--green); }
.dot-green::after { background: var(--green); }
.dot-amber { background: var(--gold); }
.dot-amber::after { background: var(--gold); }
.dot-label-green { color: var(--green); }
.dot-label-amber  { color: var(--gold); }

/* Credit pill */
.credit-pill {
  display: flex; align-items: center; gap: 7px;
  font-family: var(--font-mono); font-size: 10px;
}
.credit-track {
  width: 52px; height: 4px; border-radius: 2px;
  background: rgba(255,255,255,.08); overflow: hidden;
}
.credit-fill { height: 100%; border-radius: 2px; transition: width .4s ease; }

/* Icon buttons */
.icon-btn {
  width: 34px; height: 34px; border-radius: 10px;
  border: 1px solid var(--border);
  background: transparent; color: rgba(255,255,255,.3);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .2s ease;
  flex-shrink: 0;
}
.icon-btn:hover { border-color: var(--violet); color: var(--violet-l); background: rgba(124,58,237,.1); }
.icon-btn svg { width: 15px; height: 15px; }

/* ── No-key notice ── */
#no-key-notice {
  position: relative; z-index: 10;
  margin: 10px 14px 0;
  padding: 10px 14px;
  border-radius: 12px;
  border: 1px solid rgba(245,158,11,.3);
  background: rgba(245,158,11,.07);
  font-family: var(--font-mono); font-size: 11px;
  color: #fbbf24; text-align: center; display: none;
}

/* ── Messages area ── */
#messages-wrap {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  position: relative; z-index: 5;
  padding: 16px 12px;
  scroll-behavior: smooth;
}
#messages-inner { max-width: 720px; margin: 0 auto; }

/* Welcome screen */
#welcome {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 60vh; text-align: center;
  padding: 24px 16px;
  animation: fadeIn .6s ease forwards;
}
.welcome-logo {
  width: 80px; height: 80px; border-radius: 22px;
  background: linear-gradient(135deg, var(--violet), var(--violet-d));
  box-shadow: 0 0 40px var(--violet-glow), 0 0 80px rgba(124,58,237,.12);
  display: flex; align-items: center; justify-content: center;
  font-size: 38px; margin-bottom: 20px;
  animation: float 4s ease-in-out infinite, pulseGlow 3s ease-in-out infinite;
}
.welcome-title {
  font-weight: 900; font-size: 30px; letter-spacing: .08em;
  background: linear-gradient(135deg, var(--violet-l), var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: 6px;
}
.welcome-sub {
  font-family: var(--font-mono); font-size: 11px;
  color: rgba(255,255,255,.2); letter-spacing: .22em; text-transform: uppercase;
  margin-bottom: 32px;
}
.suggestions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 440px; }
.suggestion-btn {
  padding: 14px 12px; border-radius: 14px; text-align: left; cursor: pointer;
  border: 1px solid var(--border);
  background: rgba(255,255,255,.025);
  transition: all .25s ease;
  animation: slideUp .5s ease both;
}
.suggestion-btn:hover { border-color: rgba(124,58,237,.4); background: rgba(124,58,237,.08); }
.suggestion-icon { font-size: 18px; margin-bottom: 6px; }
.suggestion-label { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); letter-spacing: .15em; text-transform: uppercase; margin-bottom: 4px; }
.suggestion-text { font-size: 12px; color: rgba(255,255,255,.75); line-height: 1.4; }

/* Messages */
.msg-row {
  display: flex; gap: 10px; margin-bottom: 20px;
  animation: slideUp .35s ease forwards;
}
.msg-row.user { flex-direction: row-reverse; }
.msg-avatar {
  width: 32px; height: 32px; border-radius: 10px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
}
.msg-avatar.ai {
  background: linear-gradient(135deg, var(--violet), var(--violet-d));
  border: 1px solid rgba(124,58,237,.4);
  box-shadow: 0 0 12px var(--violet-glow);
}
.msg-avatar.user-av {
  background: linear-gradient(135deg, var(--gold), #d97706);
  color: #000;
  box-shadow: 0 0 12px var(--gold-glow);
}
.msg-content { max-width: 82%; display: flex; flex-direction: column; gap: 4px; }
.msg-row.user .msg-content { align-items: flex-end; }
.msg-bubble {
  padding: 12px 15px; border-radius: 16px; font-size: 13.5px; line-height: 1.65;
}
.msg-bubble.ai-bubble {
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 16px 16px 16px 4px;
  backdrop-filter: blur(12px);
}
.msg-bubble.user-bubble {
  background: rgba(124,58,237,.18);
  border: 1px solid rgba(124,58,237,.25);
  border-radius: 16px 16px 4px 16px;
  color: rgba(226,217,243,.92);
}
.msg-img { max-width: 220px; border-radius: 12px; border: 1px solid rgba(124,58,237,.3); margin-bottom: 8px; }
.msg-time { font-family: var(--font-mono); font-size: 9.5px; color: rgba(255,255,255,.15); padding: 0 4px; }
.copy-btn {
  display: flex; align-items: center; gap: 5px;
  font-family: var(--font-mono); font-size: 10px;
  color: var(--text-dim); background: none; border: none; cursor: pointer;
  padding: 3px 6px; border-radius: 6px; transition: all .2s ease;
  opacity: 0;
}
.msg-row:hover .copy-btn { opacity: 1; }
.copy-btn:hover { color: var(--gold); background: rgba(245,158,11,.08); }

/* Markdown rendering */
.md-h1  { font-size: 18px; font-weight: 900; color: #fcd34d; margin: 12px 0 6px; }
.md-h2  { font-size: 15px; font-weight: 800; color: #fcd34d; margin: 10px 0 5px; }
.md-h3  { font-size: 13px; font-weight: 700; color: var(--gold-l); margin: 8px 0 4px; }
.md-p   { margin: 5px 0; }
.md-li  { margin-left: 18px; margin-bottom: 3px; color: var(--violet-l); }
.md-code-inline {
  background: rgba(124,58,237,.2); color: var(--gold-l);
  padding: 1px 6px; border-radius: 5px; font-family: var(--font-mono);
  font-size: 12px; border: 1px solid rgba(124,58,237,.2);
}
.md-bold  { color: #fcd34d; font-weight: 700; }
.md-italic { color: var(--violet-l); font-style: italic; }
.md-link  { color: var(--gold); text-decoration: underline; }

/* Code blocks */
.code-block {
  border-radius: 12px; overflow: hidden; margin: 10px 0;
  border: 1px solid rgba(124,58,237,.2);
  background: rgba(0,0,0,.55);
}
.code-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 14px;
  border-bottom: 1px solid rgba(124,58,237,.15);
  background: rgba(124,58,237,.1);
}
.code-lang { font-family: var(--font-mono); font-size: 10px; color: var(--violet-l); letter-spacing: .12em; text-transform: uppercase; }
.code-copy-btn {
  display: flex; align-items: center; gap: 5px;
  font-family: var(--font-mono); font-size: 10px;
  color: var(--violet-l); background: none;
  border: 1px solid rgba(124,58,237,.25); border-radius: 6px;
  padding: 3px 8px; cursor: pointer; transition: all .2s ease;
}
.code-copy-btn:hover { background: rgba(124,58,237,.2); color: white; }
.code-pre { padding: 14px; overflow-x: auto; font-family: var(--font-mono); font-size: 12.5px; line-height: 1.7; color: #c4b5fd; }

/* Loader */
#typing-loader {
  display: flex; gap: 10px; align-items: flex-end;
  margin-bottom: 20px;
}
.loader-bubble {
  padding: 12px 16px; border-radius: 16px 16px 16px 4px;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  display: flex; align-items: center; gap: 10px;
}
.wave-bars { display: flex; align-items: flex-end; gap: 3px; height: 22px; }
.wave-bar {
  width: 3px; border-radius: 3px;
  background: linear-gradient(to top, var(--violet), var(--gold));
  animation: wave 1.1s ease-in-out infinite;
  height: 6px;
}
.wave-bar:nth-child(1) { animation-delay: 0s; }
.wave-bar:nth-child(2) { animation-delay: .12s; }
.wave-bar:nth-child(3) { animation-delay: .24s; }
.wave-bar:nth-child(4) { animation-delay: .36s; }
.wave-bar:nth-child(5) { animation-delay: .48s; }
.loader-text { font-family: var(--font-mono); font-size: 11px; color: var(--violet-l); letter-spacing: .1em; animation: shimmer 2s ease-in-out infinite; }

/* Error */
.error-box {
  margin: 0 0 16px 42px; padding: 10px 14px; border-radius: 12px;
  border: 1px solid rgba(239,68,68,.3); background: rgba(239,68,68,.08);
  font-family: var(--font-mono); font-size: 11.5px; color: #f87171;
}

/* ── Credit mobile row ── */
#credit-mobile {
  display: none; justify-content: center; padding: 6px 0;
  border-top: 1px solid var(--border);
  background: rgba(5,5,5,.8);
  position: relative; z-index: 10;
}

/* ── Input Bar ── */
#input-area {
  position: relative; z-index: 10;
  border-top: 1px solid var(--border);
  background: rgba(5,5,5,.88);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  padding: 10px 12px 14px;
  max-width: 100%;
}
.input-max { max-width: 720px; margin: 0 auto; }
#img-preview-wrap {
  display: none; align-items: center; gap: 8px;
  margin-bottom: 8px;
}
#img-preview { width: 56px; height: 56px; object-fit: cover; border-radius: 10px; border: 1px solid rgba(124,58,237,.4); }
#remove-img-btn {
  width: 20px; height: 20px; border-radius: 50%;
  background: #ef4444; color: white; border: none; cursor: pointer;
  font-size: 12px; display: flex; align-items: center; justify-content: center;
  line-height: 1;
}
.vision-label { font-family: var(--font-mono); font-size: 10px; color: var(--gold); }

/* Voice listening indicator */
#voice-indicator {
  display: none; align-items: center; gap: 8px;
  margin-bottom: 6px;
  font-family: var(--font-mono); font-size: 10px; color: #f87171;
}
#voice-indicator .rec-dot {
  width: 8px; height: 8px; border-radius: 50%; background: #ef4444;
  animation: shimmer .8s ease-in-out infinite;
}

/* Bar */
.bar-wrap {
  display: flex; align-items: flex-end; gap: 6px;
  padding: 8px 8px 8px 10px;
  border-radius: 18px; border: 1px solid var(--border);
  background: rgba(255,255,255,.035);
  box-shadow: 0 8px 32px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.05);
}
.bar-btn {
  flex-shrink: 0; width: 36px; height: 36px; border-radius: 10px;
  border: 1px solid var(--border); background: transparent;
  color: rgba(255,255,255,.35); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s ease;
}
.bar-btn:hover { border-color: var(--violet); color: var(--violet-l); background: rgba(124,58,237,.1); }
.bar-btn svg { width: 16px; height: 16px; }
.bar-btn.voice-active { border-color: #ef4444; color: #f87171; background: rgba(239,68,68,.12); }
#textarea {
  flex: 1; background: transparent; border: none; outline: none; resize: none;
  font-family: var(--font-display); font-size: 13.5px; color: rgba(255,255,255,.9);
  line-height: 1.55; padding: 6px 4px;
  min-height: 36px; max-height: 140px; overflow-y: auto;
  scrollbar-width: none;
}
#textarea::placeholder { color: rgba(255,255,255,.2); }
#textarea::-webkit-scrollbar { display: none; }
#send-btn {
  flex-shrink: 0; width: 36px; height: 36px; border-radius: 10px; border: none;
  background: linear-gradient(135deg, var(--violet), var(--violet-d));
  box-shadow: 0 0 16px var(--violet-glow);
  color: white; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s ease;
}
#send-btn:hover { box-shadow: 0 0 28px var(--violet-glow); transform: scale(1.05); }
#send-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; box-shadow: none; }
#send-btn svg { width: 16px; height: 16px; }
.bar-hint {
  text-align: center; font-family: var(--font-mono); font-size: 9.5px;
  color: rgba(255,255,255,.12); margin-top: 7px;
}

/* ── Admin Panel ── */
.overlay {
  position: fixed; inset: 0; z-index: 99;
  background: rgba(5,5,5,.88); backdrop-filter: blur(12px);
  display: none; align-items: center; justify-content: center; padding: 16px;
}
.overlay.show { display: flex; }
.panel {
  width: 100%; max-width: 480px; border-radius: 22px;
  border: 1px solid rgba(124,58,237,.3);
  background: linear-gradient(135deg, #0a0a12, #0e0a1c);
  box-shadow: 0 0 60px rgba(124,58,237,.2);
  overflow: hidden; animation: slideUp .3s ease forwards;
}
.panel-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 20px;
  border-bottom: 1px solid var(--border);
}
.panel-title {
  font-weight: 900; font-size: 16px; letter-spacing: .1em;
  background: linear-gradient(135deg, var(--violet-l), var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.panel-sub { font-family: var(--font-mono); font-size: 9px; color: rgba(255,255,255,.2); letter-spacing: .18em; margin-top: 2px; text-transform: uppercase; }
.close-btn {
  width: 30px; height: 30px; border-radius: 8px;
  border: 1px solid var(--border); background: transparent;
  color: rgba(255,255,255,.3); cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center; transition:
