<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1"/>
  <meta name="theme-color" content="#050505"/>
  <meta name="description" content="Aegis Prime — Elite AI Intelligence Assistant"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Aegis Prime"/>

  <!-- Open Graph -->
  <meta property="og:title" content="Aegis Prime — Elite AI"/>
  <meta property="og:description" content="Ultra-fast AI intelligence powered by Groq + GPT-4o Vision"/>
  <meta property="og:type" content="website"/>

  <title>Aegis Prime ⚡ Elite AI</title>

  <!-- Favicon SVG inline -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>"/>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>

  <!-- Tailwind CSS CDN (with custom config support via data-config) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Tailwind config — injected before component loads
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            violet: {
              50:  '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe',
              300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6',
              600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6',
              900: '#4c1d95', 950: '#2e1065',
            },
            amber: {
              300: '#fcd34d', 400: '#fbbf24', 500: '#f59e0b',
              600: '#d97706', 700: '#b45309',
            },
          },
          fontFamily: {
            sans: ['Space Grotesk', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
          },
          animation: {
            'spin-slow': 'spin 3s linear infinite',
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          backdropBlur: { xl: '24px', '2xl': '40px' },
          boxShadow: {
            'glow-violet': '0 0 20px rgba(139,92,246,0.4), 0 0 40px rgba(139,92,246,0.1)',
            'glow-amber':  '0 0 20px rgba(245,158,11,0.4), 0 0 40px rgba(245,158,11,0.1)',
            'glow-sm': '0 0 8px rgba(139,92,246,0.4)',
          },
        },
      },
    };
  </script>

  <!-- Base styles -->
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: #050505; overflow: hidden; }
    #root { height: 100vh; height: 100dvh; display: flex; flex-direction: column; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(139,92,246,0.3); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(139,92,246,0.6); }

    /* Smooth scrolling */
    * { scroll-behavior: smooth; }

    /* Selection */
    ::selection { background: rgba(139,92,246,0.4); color: white; }

    /* Input appearance reset */
    input, textarea, button { font-family: 'Space Grotesk', system-ui, sans-serif; }
    textarea { -webkit-appearance: none; }

    /* Remove tap highlight on mobile */
    * { -webkit-tap-highlight-color: transparent; }

    /* Safe area padding for iPhone notch */
    @supports (padding-top: env(safe-area-inset-top)) {
      #root {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
    }

    /* Loading screen */
    #loading-screen {
      position: fixed; inset: 0; z-index: 9999;
      background: #050505;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      transition: opacity 0.5s ease;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }
    .loading-logo {
      width: 64px; height: 64px; border-radius: 18px;
      background: linear-gradient(135deg, #7c3aed, #4c1d95);
      box-shadow: 0 0 40px rgba(139,92,246,0.6);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      animation: float-loading 2s ease-in-out infinite;
    }
    .loading-bar {
      width: 160px; height: 2px; background: rgba(255,255,255,0.1);
      border-radius: 2px; overflow: hidden;
    }
    .loading-bar-fill {
      height: 100%; border-radius: 2px;
      background: linear-gradient(90deg, #7c3aed, #f59e0b);
      animation: loading-fill 1.5s ease forwards;
    }
    @keyframes float-loading { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @keyframes loading-fill { from{width:0} to{width:100%} }
    @keyframes slide-in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    /* PWA install prompt */
    .pwa-banner {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: rgba(15,10,26,0.95); border: 1px solid rgba(139,92,246,0.3);
      backdrop-filter: blur(20px); border-radius: 16px;
      padding: 12px 20px; z-index: 999;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      animation: slide-in 0.4s ease forwards;
      white-space: nowrap;
    }
  </style>
</head>

<body>
  <!-- Loading screen -->
  <div id="loading-screen">
    <div class="loading-logo">⚡</div>
    <div style="text-align:center">
      <div style="font-family:'Space Grotesk',sans-serif;font-weight:900;font-size:20px;
        background:linear-gradient(135deg,#a78bfa,#f59e0b);-webkit-background-clip:text;
        -webkit-text-fill-color:transparent;letter-spacing:0.1em">AEGIS PRIME</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(255,255,255,0.2);
        letter-spacing:0.2em;margin-top:4px">INITIALIZING SYSTEMS</div>
    </div>
    <div class="loading-bar"><div class="loading-bar-fill"></div></div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:rgba(255,255,255,0.15);
      letter-spacing:0.15em">POWERED BY GROQ + GPT-4O VISION</div>
  </div>

  <!-- React root -->
  <div id="root"></div>

  <!-- React 18 + ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel standalone for JSX transformation (dev only; use Vite for production) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- App entry point -->
  <script type="text/babel" data-presets="react" data-plugins="transform-modules-umd" src="./src/App.jsx"></script>

  <!-- Fallback inline mount (if module loading fails) -->
  <script>
    // Hide loading screen once React mounts
    window.addEventListener('load', () => {
      setTimeout(() => {
        const ls = document.getElementById('loading-screen');
        if (ls) { ls.classList.add('hidden'); setTimeout(() => ls.remove(), 500); }
      }, 1600);
    });

    // PWA: register service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }

    // PWA install prompt
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (sessionStorage.getItem('pwa-dismissed')) return;
      const banner = document.createElement('div');
      banner.className = 'pwa-banner';
      banner.innerHTML = `
        <span style="font-size:20px">📱</span>
        <div>
          <div style="font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;color:white">Install Aegis Prime</div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:rgba(255,255,255,0.4)">Add to home screen for best experience</div>
        </div>
        <button id="pwa-install" style="padding:6px 14px;border-radius:10px;border:none;cursor:pointer;
          background:linear-gradient(135deg,#7c3aed,#6d28d9);color:white;font-size:11px;font-weight:700">
          Install
        </button>
        <button id="pwa-dismiss" style="padding:6px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);
          background:transparent;color:rgba(255,255,255,0.3);cursor:pointer;font-size:14px">✕</button>
      `;
      document.body.appendChild(banner);
      document.getElementById('pwa-install').onclick = async () => {
        await deferredPrompt.prompt();
        banner.remove();
      };
      document.getElementById('pwa-dismiss').onclick = () => {
        sessionStorage.setItem('pwa-dismissed', '1');
        banner.remove();
      };
    });
  </script>
</body>
</html>
